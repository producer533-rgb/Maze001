<div id="titleScreen">

  <button onclick="startGameWithPlayer('🦖')">🦖 Dinosaur</button>
  <button onclick="startGameWithPlayer('🐱')">🐱 Cat</button>
</div>
  
<div id="gameArea">

  <div id="messageBox"></div>
</div>

.controls button {

    { x: 5, y: 5, emoji: "💎", points: 5 },
    { x: 7, y: 8, emoji: "🪙", points: 3 }
  ]
];

let collectibles = JSON.parse(JSON.stringify(levelCollectibles[currentLevel])); 
let score = 0;    

const collectSound = new Audio("collect.mp3");
const winSound = new Audio("win.mp3");
const moveSound = new Audio("move.mp3");
    
let time = 0;
let timerInterval;
let timerStarted = false;
let levelChanging = false;    
let bestTime = localStorage.getItem("bestTime");
document.getElementById("bestTime").textContent =
  bestTime ? bestTime + " seconds" : "None yet";

document.getElementById("levelDisplay").textContent =
  "Level " + (currentLevel + 1);    

function startTimer() {
  clearInterval(timerInterval);

  time = 0;
  timerStarted = true;

  document.getElementById("timer").textContent = time;

  timerInterval = setInterval(function() {
    time++;
    document.getElementById("timer").textContent = time;
  }, 1000);
} 

function startGameWithPlayer(emoji) {
  playerEmoji = emoji;

  document.getElementById("titleScreen").style.display = "none";
  document.getElementById("gameArea").style.display = "block";

  currentLevel = 0;
  maze = levels[currentLevel];
  player = { x: 1, y: 1 };
  collectibles = JSON.parse(JSON.stringify(levelCollectibles[currentLevel]));
  score = 0;

  document.getElementById("score").textContent = score;
  document.getElementById("levelDisplay").textContent = "Level 1";
  document.getElementById("messageBox").style.display = "none";

  clearInterval(timerInterval);
  startTimer();

  updateBestTimeDisplay();
  drawMaze();
}
    
function restartGame() {
  currentLevel = 0;
  levelChanging = false;

  document.getElementById("levelDisplay").textContent =
  "Level " + (currentLevel + 1);
  
  maze = levels[currentLevel];
  player = { x: 1, y: 1 };

  clearInterval(timerInterval);
  time = 0;
  timerStarted = false;
  document.getElementById("timer").textContent = 0;

  startTimer();

  document.getElementById("messageBox").style.display = "none";

  collectibles = JSON.parse(JSON.stringify(levelCollectibles[currentLevel]));
  score = 0;
  document.getElementById("score").textContent = score;
  
  drawMaze();
  updateBestTimeDisplay();
  collectibles.forEach(item => {
  ctx.font = "30px Arial";
  ctx.fillText(
    item.emoji,
    item.x * tile + 3,
    item.y * tile + 30
  );
});
}

function showMessage(text) {
  const box = document.getElementById("messageBox");

  box.innerHTML =
    text +
    "<br><br>" +
    "<button onclick='closeMessage()'>OK</button>";

  box.style.display = "block";
}

function showFinalMessage(text) {
  const box = document.getElementById("messageBox");

  box.innerHTML = text;
  box.style.display = "block";
}

function closeMessage() {
  document.getElementById("messageBox").style.display = "none";
}
    
function updateBestTimeDisplay() {
  let savedBestTime = localStorage.getItem("bestTimeLevel" + currentLevel);

  document.getElementById("bestTime").textContent =
    savedBestTime ? savedBestTime + " seconds" : "None yet";
}
    
function drawMaze() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < maze.length; y++) {
    for (let x = 0; x < maze[y].length; x++) {
if (maze[y][x] === 1) {
  ctx.drawImage(wallImage, x * tile, y * tile, tile, tile);
} else {
const tileKey = `${x},${y}`;

if (
  levelPathTiles[currentLevel] &&
  levelPathTiles[currentLevel][tileKey]
) {
ctx.drawImage(
  tileImages[levelPathTiles[currentLevel][tileKey]],
  x * tile,
  y * tile,
  tile,
  tile
);
} else {
  ctx.drawImage(
    pathImage,
    x * tile,
    y * tile,
    tile,
    tile
  );
}
}

      if (maze[y][x] === 2) {
        ctx.font = "36px Arial";
        ctx.fillText("🎁", x * tile + 2, y * tile + 34);
      }
    }
  }

  collectibles.forEach(item => {
    ctx.font = "30px Arial";
    ctx.fillText(item.emoji, item.x * tile + 3, item.y * tile + 30);
  });

  ctx.font = "40px Arial";
  ctx.fillText(playerEmoji, player.x * tile + 2, player.y * tile + 54);
}

    function movePlayer(dx, dy) {

    if (levelChanging) {
      return;
}
      
document.getElementById("messageBox").style.display = "none";
      
  if (!timerStarted) {
    startTimer();
  }

  const newX = player.x + dx;
  const newY = player.y + dy;

  if (maze[newY][newX] !== 1) {
    player.x = newX;
    player.y = newY;
    moveSound.play();
  }

  collectibles = collectibles.filter(item => {
    if (item.x === player.x && item.y === player.y) {
      score += item.points;
      document.getElementById("score").textContent = score;
      collectSound.play();
      if (item.emoji === "💎") {
  showMessage("💎 WOW! A Sparkly Gem!");
}
else if (item.emoji === "🪙") {
  showMessage("🪙 You found a Gold Coin!");
}
else {
  showMessage("⭐ Great job! You found a Star!");
}
      return false;
    }

    return true;
  });

if (maze[player.y][player.x] === 2) {
  levelChanging = true;

  let levelTime = time;

  let maxPoints = levelCollectibles[currentLevel]
     .reduce((sum, item) => sum + item.points, 0);

   let stars;

   if (score >= maxPoints) {
     stars = "⭐⭐⭐";
   } else if (score >= maxPoints * 0.5) {
     stars = "⭐⭐";
   } else {
     stars = "⭐";
   }

    let bestTimeKey = "bestTimeLevel" + currentLevel;
    let savedBestTime = localStorage.getItem(bestTimeKey);

  if (!savedBestTime || levelTime < Number(savedBestTime)) {
  localStorage.setItem(bestTimeKey, levelTime);
}

    winSound.play();

    setTimeout(() => {

    let completedLevel = currentLevel + 1;
      
    currentLevel++;

  if (currentLevel < levels.length) {
  let message =
  "🎉 Level " + completedLevel + " Complete!<br>" +
  "Time: " + levelTime + " seconds<br>" +
  "Stars: " + stars;

if (!savedBestTime || levelTime < Number(savedBestTime)) {
  message += "<br><br>⏱️ NEW BEST TIME!";
}

showMessage(message);

      maze = levels[currentLevel];
      player = { x: 1, y: 1 };
      collectibles = JSON.parse(JSON.stringify(levelCollectibles[currentLevel]));

      document.getElementById("levelDisplay").textContent =
         "Level " + (currentLevel + 1);    
    
      score = 0;
      document.getElementById("score").textContent = score;

      clearInterval(timerInterval);
      startTimer();

      updateBestTimeDisplay();
      levelChanging = false;
      drawMaze();
      return;
    } else {
      clearInterval(timerInterval);

levelChanging = false;
    
showFinalMessage(
  "🎉 Level " + completedLevel + " Complete!<br>" +
  "Time: " + levelTime + " seconds<br>" +
  "Stars: " + stars +
  "<br><br>" +
  "<button onclick='restartGame()'>Play Again From Level 1</button>"
);
      return;
    }
  }, 1500); // Wait 1.5 seconds before loading next level

}
      
  drawMaze();

}      
    
    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowUp") movePlayer(0, -1);
      if (event.key === "ArrowDown") movePlayer(0, 1);
      if (event.key === "ArrowLeft") movePlayer(-1, 0);
      if (event.key === "ArrowRight") movePlayer(1, 0);
    });

drawMaze();
updateBestTimeDisplay();

  </script>
</body>
</html>
